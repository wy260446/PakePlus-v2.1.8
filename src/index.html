<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>批量码工坊</title><script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}body{background:#ffffff;min-height:100vh;padding:24px;display:flex;align-items:center;justify-content:center}.container{width:100%;max-width:100%;background:#ffffff;padding:32px 40px;position:relative;margin:0 auto}.header{text-align:center;margin-bottom:32px}.header h1{font-size:clamp(2rem,4vw,2.8rem);font-weight:700;background:linear-gradient(145deg,#2b6c9e,#5f2b8a);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:inline-flex;align-items:center;gap:10px;margin-bottom:8px}.header p{font-size:1.1rem;color:#4a5568;opacity:0.8}.mode-bar{display:flex;justify-content:center;margin-bottom:30px}.mode-btn{background:#f1f5f9;color:#2d3748;border:1px solid #dde7f0;border-radius:50px;font-size:1.1rem;font-weight:600;padding:12px 36px;cursor:pointer;display:inline-flex;align-items:center;gap:10px;box-shadow:0 6px 12px rgba(0,0,0,0.05);transition:0.2s}.mode-btn i{background:linear-gradient(145deg,#2b6c9e,#5f2b8a);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.mode-btn:hover{transform:translateY(-2px);box-shadow:0 12px 20px rgba(0,0,0,0.1)}.mode-btn:active{transform:scale(0.97)}.text-toggle-btn{background:#e6eefc;color:#1e293b;border:1px solid #bdd3e8;border-radius:40px;font-size:1rem;font-weight:600;padding:10px 18px;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;box-shadow:0 4px 8px rgba(0,0,0,0.03);transition:0.1s;width:100%}.text-toggle-btn.active{background:#d1e0fd;border-color:#6b46c1;color:#2c1b5e}.panel{transition:opacity 0.2s}.hidden-panel{display:none}.input-group{margin-bottom:24px}.input-group label{display:block;margin-bottom:8px;font-weight:600;color:#2d3748;font-size:1rem;padding-left:6px}textarea,input{width:100%;padding:16px 20px;border:2px solid #e9eef5;border-radius:28px;font-size:1rem;background:#ffffff;box-shadow:inset 0 2px 8px rgba(0,0,0,0.02);transition:0.2s;outline:none}textarea{height:140px;resize:vertical}textarea:focus,input:focus{border-color:#6b46c1;box-shadow:0 0 0 4px rgba(107,70,193,0.15)}.button-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:20px;margin-bottom:28px}.button-grid button{width:100%;margin:0;padding:14px 8px;border-radius:40px;font-size:1rem;font-weight:600;display:inline-flex;align-items:center;justify-content:center;gap:8px;box-shadow:0 8px 16px rgba(0,0,0,0.1);border:none;cursor:pointer;transition:0.2s;white-space:nowrap;line-height:1.2;max-width:300px;justify-self:center}.button-grid button:hover{transform:translateY(-3px);box-shadow:0 12px 24px rgba(0,0,0,0.15)}.button-grid button:active{transform:scale(0.96);box-shadow:0 4px 8px rgba(0,0,0,0.1)}.generate-btn{background:linear-gradient(145deg,#2b6c9e,#5f2b8a);color:white}.clear-btn{background:#f1f5f9;color:#2d3748;border:1px solid #dde7f0}.download-all-btn{background:linear-gradient(145deg,#b45309,#c2410c);color:white}.grid{display:flex;flex-wrap:wrap;gap:24px;justify-content:center;margin:30px 0 20px;max-height:600px;overflow-y:auto;padding:8px 4px}.card{background:white;border-radius:32px;padding:24px 18px 20px;box-shadow:0 20px 35px -8px rgba(0,0,0,0.15);width:100%;max-width:280px;display:flex;flex-direction:column;align-items:center;transition:0.2s}.card:hover{transform:translateY(-6px)}.qr-place{background:white;padding:12px;border-radius:28px;box-shadow:0 8px 20px rgba(0,0,0,0.05);margin-bottom:18px;width:100%;display:flex;justify-content:center}.barcode-place{background:white;padding:14px;border-radius:28px;box-shadow:0 8px 20px rgba(0,0,0,0.05);margin-bottom:18px;width:100%;display:flex;flex-direction:column;align-items:center}.barcode-place canvas{max-width:100%;height:auto;border-radius:8px}.text-custom{width:100%;margin:8px 0 14px}.text-input{width:100%;padding:12px 14px;border:2px solid #e9eef5;border-radius:40px;font-size:0.9rem;text-align:center;background:#f9fcff}.text-custom.hidden{display:none}.download-single{background:linear-gradient(145deg,#0f766e,#0b5e5a);color:white;border:none;border-radius:40px;padding:10px 20px;font-size:0.95rem;font-weight:600;display:inline-flex;align-items:center;gap:8px;box-shadow:0 6px 12px rgba(0,0,0,0.1);cursor:pointer;width:auto;min-width:140px;justify-content:center}.download-single:hover{background:linear-gradient(145deg,#0b5e58,#094c47);transform:scale(1.02)}.empty-message{text-align:center;color:#94a3b8;padding:40px;width:100%}@media (max-width:900px){.button-grid{grid-template-columns:repeat(2,1fr);gap:14px}.container{padding:28px 20px}.button-grid button{white-space:normal;padding:12px 6px;max-width:none}}@media (max-width:500px){body{padding:10px}.container{padding:20px 14px}.button-grid{gap:10px}.button-grid button{font-size:0.85rem;padding:10px 4px}.text-toggle-btn{font-size:0.85rem}.card{max-width:260px}}</style></head><body><div class="container"><div class="header"><h1><i class="fa-solid fa-arrows-rotate"></i> 码工坊</h1><p>批量二维码 / 条码</p></div><div class="mode-bar"><button class="mode-btn" id="switchModeBtn"><i class="fa-solid fa-qrcode"></i><span id="modeBtnText">切换到条码</span><i class="fa-solid fa-barcode"></i></button></div><div id="qrPanel" class="panel"><div class="input-group"><label for="inputText"><i class="fa-regular fa-message"></i> 二维码内容 (一行一个)</label> <textarea id="inputText" placeholder="https://baidu.com&#10;Hello World&#10;扫码有惊喜">https://baidu.com
Hello World
扫码有惊喜</textarea> </div><div class="button-grid"><button class="generate-btn" id="generateBtn"><i class="fa-solid fa-bolt"></i> 批量生成</button><button class="clear-btn" id="clearBtn"><i class="fa-regular fa-trash-can"></i> 清空</button><button class="download-all-btn" id="downloadAllBtn"><i class="fa-regular fa-image"></i> 保存长图</button><button class="text-toggle-btn active" id="qrTextToggleBtn"><i class="fa-regular fa-font"></i><span class="toggle-text-label">隐藏文字</span></button></div><div id="qrGrid" class="grid"><div class="empty-message"><i class="fa-solid fa-qrcode fa-2xl" style="opacity:0.3;"></i><p>点击「批量生成」预览</p></div></div></div><div id="barcodePanel" class="panel hidden-panel"><div class="input-group"><label for="barcodeBatchInput"><i class="fa-regular fa-keyboard"></i> 条码内容 (一行一个)</label> <textarea id="barcodeBatchInput" placeholder="5901234123457&#10;ABC-123&#10;978020137962">5901234123457
ABC-123
978020137962</textarea> </div><div class="button-grid"><button class="generate-btn" id="barcodeBatchGenerateBtn"><i class="fa-solid fa-bolt"></i> 批量生成</button><button class="clear-btn" id="barcodeBatchClearBtn"><i class="fa-regular fa-trash-can"></i> 清空</button><button class="download-all-btn" id="barcodeBatchDownloadAllBtn"><i class="fa-regular fa-image"></i> 保存长图</button><button class="text-toggle-btn active" id="barcodeTextToggleBtn"><i class="fa-regular fa-font"></i><span class="toggle-text-label">隐藏文字</span></button></div><div id="barcodeGrid" class="grid"><div class="empty-message"><i class="fa-solid fa-barcode fa-2xl" style="opacity:0.3;"></i><p>点击「批量生成条码」预览</p></div></div></div></div><script>(function() { const STORAGE_KEY = 'preferredMode'; const TEXT_TOGGLE_KEY = 'showTextEnabled'; let isQrMode = true; let showTextEnabled = true; const switchBtn = document.getElementById('switchModeBtn'); const btnText = document.getElementById('modeBtnText'); const qrPanel = document.getElementById('qrPanel'); const barcodePanel = document.getElementById('barcodePanel'); const qrTextToggle = document.getElementById('qrTextToggleBtn'); const barcodeTextToggle = document.getElementById('barcodeTextToggleBtn'); function initToggleFromStorage() { const saved = localStorage.getItem(TEXT_TOGGLE_KEY); if (saved !== null) showTextEnabled = (saved === 'true'); else showTextEnabled = true; updateToggleButtonsUI(); updateAllCardsTextVisibility(); } function updateToggleButtonsUI() { const label = showTextEnabled ? '隐藏文字' : '显示文字'; [qrTextToggle, barcodeTextToggle].forEach(btn => { if (!btn) return; if (showTextEnabled) btn.classList.add('active'); else btn.classList.remove('active'); const span = btn.querySelector('.toggle-text-label'); if (span) span.innerText = label; }); } function toggleTextVisibility() { showTextEnabled = !showTextEnabled; localStorage.setItem(TEXT_TOGGLE_KEY, showTextEnabled); updateToggleButtonsUI(); updateAllCardsTextVisibility(); } qrTextToggle.addEventListener('click', toggleTextVisibility); barcodeTextToggle.addEventListener('click', toggleTextVisibility); function updateAllCardsTextVisibility() { document.querySelectorAll('.card .text-custom').forEach(container => { container.classList.toggle('hidden', !showTextEnabled); }); } function switchToQr() { qrPanel.classList.remove('hidden-panel'); barcodePanel.classList.add('hidden-panel'); btnText.innerText = '切换到条码'; isQrMode = true; localStorage.setItem(STORAGE_KEY, 'qr'); } function switchToBarcode() { qrPanel.classList.add('hidden-panel'); barcodePanel.classList.remove('hidden-panel'); btnText.innerText = '切换到二维码'; isQrMode = false; localStorage.setItem(STORAGE_KEY, 'barcode'); } function initMode() { const saved = localStorage.getItem(STORAGE_KEY); saved === 'barcode' ? switchToBarcode() : switchToQr(); } switchBtn.addEventListener('click', () => isQrMode ? switchToBarcode() : switchToQr()); (function() { const input = document.getElementById('inputText'); const grid = document.getElementById('qrGrid'); const genBtn = document.getElementById('generateBtn'); const clearBtn = document.getElementById('clearBtn'); const downBtn = document.getElementById('downloadAllBtn'); function showEmpty() { grid.innerHTML = `<div class="empty-message"><i class="fa-solid fa-qrcode fa-2xl" style="opacity:0.3;"></i><p>点击「批量生成」预览</p></div>`; } function clearGrid() { grid.innerHTML = ''; showEmpty(); } function getQRImage(container) { return new Promise((resolve, reject) => { const canvas = container.querySelector('canvas'); if (canvas) { const img = new Image(); img.onload=()=>resolve(img); img.onerror=reject; img.src=canvas.toDataURL('image/png'); } else { const imgElem = container.querySelector('img'); if (imgElem?.src) { const img = new Image(); img.onload=()=>resolve(img); img.onerror=reject; img.src=imgElem.src; } else reject('no image'); } }); } async function drawWithText(qrContainer, bottomText) { const img = await getQRImage(qrContainer); const pw=20, fz=24, tp=16; let ch = img.height + pw*2; if (bottomText?.trim()) ch += fz + tp*2; const canvas = document.createElement('canvas'); canvas.width = img.width + pw*2; canvas.height = ch; const ctx = canvas.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.drawImage(img, pw, pw, img.width, img.height); if (bottomText?.trim()) { ctx.fillStyle='#000'; ctx.font=`bold ${fz}px 'Inter',sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; const y = pw + img.height + tp + fz/2; let f = fz; if (ctx.measureText(bottomText).width> canvas.width-2*pw) f = fz * (canvas.width-2*pw)/ctx.measureText(bottomText).width; ctx.font = `bold ${Math.min(fz, f)}px 'Inter',sans-serif`; ctx.fillText(bottomText, canvas.width/2, y); } return canvas; } function generate() { const lines = input.value.split(/\n/).map(l=>l.trim()).filter(l=>l); if (!lines.length) return alert('至少输入一行'); if (typeof QRCode === 'undefined') { grid.innerHTML = '<div class="empty-message">库加载失败</div>'; return; } grid.innerHTML = ''; lines.forEach((line, idx) => { const card = document.createElement('div'); card.className = 'card'; const qrDiv = document.createElement('div'); qrDiv.className = 'qr-place'; const customDiv = document.createElement('div'); customDiv.className = 'text-custom' + (showTextEnabled?'':' hidden'); const textInput = document.createElement('input'); textInput.className='text-input'; textInput.value=line; textInput.placeholder='底部文字'; const downBtn = document.createElement('button'); downBtn.className='download-single'; downBtn.innerHTML='<i class="fa-regular fa-circle-down"></i> 保存'; customDiv.appendChild(textInput); card.append(qrDiv, customDiv, downBtn); grid.appendChild(card); try { new QRCode(qrDiv, { text: line, width:160, height:160, colorDark:"#1a202c", colorLight:"#fff", correctLevel: QRCode.CorrectLevel.H }); } catch { qrDiv.innerHTML = '<span style="color:red;">失败</span>'; } downBtn.addEventListener('click', async () => { const t = textInput.value.trim(); const final = showTextEnabled ? t : ''; try { const canv = await drawWithText(qrDiv, final); const a = document.createElement('a'); a.download = `qr_${idx+1}.png`; a.href = canv.toDataURL('image/png'); a.click(); } catch { alert('下载失败'); } }); }); } async function downloadAll() { const cards = document.querySelectorAll('#qrGrid .card'); if (!cards.length) return alert('没有卡片'); const canvases = []; for (let card of cards) { const qrDiv = card.querySelector('.qr-place'); const text = card.querySelector('.text-input')?.value.trim() || ''; const final = showTextEnabled ? text : ''; try { canvases.push(await drawWithText(qrDiv, final)); } catch (e) { console.warn(e); } } if (!canvases.length) return; const w = Math.max(...canvases.map(c=>c.width)), h = canvases.reduce((a,c)=>a+c.height,0); const big = document.createElement('canvas'); big.width = w; big.height = h; const ctx = big.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); let y=0; for (let c of canvases) { ctx.drawImage(c, (w-c.width)/2, y); y+=c.height; } const a = document.createElement('a'); a.download = 'all_qrcodes.png'; a.href = big.toDataURL('image/png'); a.click(); } genBtn.addEventListener('click', generate); clearBtn.addEventListener('click', ()=>{ input.value=''; clearGrid(); }); downBtn.addEventListener('click', downloadAll); input.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); generate(); } }); })(); (function() { const input = document.getElementById('barcodeBatchInput'); const grid = document.getElementById('barcodeGrid'); const genBtn = document.getElementById('barcodeBatchGenerateBtn'); const clearBtn = document.getElementById('barcodeBatchClearBtn'); const downBtn = document.getElementById('barcodeBatchDownloadAllBtn'); function showEmpty() { grid.innerHTML = `<div class="empty-message"><i class="fa-solid fa-barcode fa-2xl" style="opacity:0.3;"></i><p>点击「批量生成」预览</p></div>`; } function clearGrid() { grid.innerHTML = ''; showEmpty(); } async function drawBarcodeWithText(bcCanvas, bottomText) { const bw = bcCanvas.width, bh = bcCanvas.height; const pad=20, fz=24, tp=16; let ch = bh + pad*2; if (bottomText?.trim()) ch += fz + tp*2; const canvas = document.createElement('canvas'); canvas.width = bw+pad*2; canvas.height = ch; const ctx = canvas.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,canvas.width,canvas.height); ctx.drawImage(bcCanvas, pad, pad, bw, bh); if (bottomText?.trim()) { ctx.fillStyle='#000'; ctx.font=`bold ${fz}px 'Inter',sans-serif`; ctx.textAlign='center'; ctx.textBaseline='middle'; const y = pad + bh + tp + fz/2; let f = fz; if (ctx.measureText(bottomText).width> canvas.width-2*pad) f = fz * (canvas.width-2*pad)/ctx.measureText(bottomText).width; ctx.font = `bold ${Math.min(fz, f)}px 'Inter',sans-serif`; ctx.fillText(bottomText, canvas.width/2, y); } return canvas; } function generateCard(line, idx) { const card = document.createElement('div'); card.className = 'card'; const bcDiv = document.createElement('div'); bcDiv.className = 'barcode-place'; const canvas = document.createElement('canvas'); bcDiv.appendChild(canvas); const customDiv = document.createElement('div'); customDiv.className = 'text-custom' + (showTextEnabled?'':' hidden'); const textInput = document.createElement('input'); textInput.className='text-input'; textInput.value=line; textInput.placeholder='底部文字'; customDiv.appendChild(textInput); const downBtn = document.createElement('button'); downBtn.className='download-single'; downBtn.innerHTML='<i class="fa-regular fa-circle-down"></i> 保存'; card.append(bcDiv, customDiv, downBtn); grid.appendChild(card); try { JsBarcode(canvas, line, { format:"code128", width:2.0, height:70, displayValue:false, background:"#fff", lineColor:"#1a202c", margin:8 }); } catch { const ctx = canvas.getContext('2d'); ctx.clearRect(0,0,canvas.width,canvas.height); ctx.font='14px Inter'; ctx.fillStyle='#999'; ctx.textAlign='center'; ctx.fillText('无效', canvas.width/2, canvas.height/2); } downBtn.addEventListener('click', async () => { const t = textInput.value.trim(); const final = showTextEnabled ? t : ''; try { const res = await drawBarcodeWithText(canvas, final); const a = document.createElement('a'); a.download = `barcode_${idx+1}.png`; a.href = res.toDataURL('image/png'); a.click(); } catch { alert('下载失败'); } }); } function generateAll() { const lines = input.value.split(/\n/).map(l=>l.trim()).filter(l=>l); if (!lines.length) return alert('至少输入一行'); grid.innerHTML = ''; lines.forEach((line, i) => generateCard(line, i)); } async function downloadAllLong() { const cards = document.querySelectorAll('#barcodeGrid .card'); if (!cards.length) return alert('无卡片'); const canvases = []; for (let card of cards) { const bcCanvas = card.querySelector('canvas'); const text = card.querySelector('.text-input')?.value.trim() || ''; const final = showTextEnabled ? text : ''; try { canvases.push(await drawBarcodeWithText(bcCanvas, final)); } catch (e) { console.warn(e); } } if (!canvases.length) return; const w = Math.max(...canvases.map(c=>c.width)), h = canvases.reduce((a,c)=>a+c.height,0); const big = document.createElement('canvas'); big.width = w; big.height = h; const ctx = big.getContext('2d'); ctx.fillStyle='#fff'; ctx.fillRect(0,0,w,h); let y=0; for (let c of canvases) { ctx.drawImage(c, (w-c.width)/2, y); y+=c.height; } const a = document.createElement('a'); a.download = 'all_barcodes.png'; a.href = big.toDataURL('image/png'); a.click(); } genBtn.addEventListener('click', generateAll); clearBtn.addEventListener('click', ()=>{ input.value=''; clearGrid(); }); downBtn.addEventListener('click', downloadAllLong); input.addEventListener('keydown', e => { if ((e.ctrlKey||e.metaKey) && e.key==='Enter') { e.preventDefault(); generateAll(); } }); })(); initToggleFromStorage(); initMode(); })();</script></body></html>
