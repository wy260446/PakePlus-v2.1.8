<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"><title>批量二维码 · 条码生成 (桌面优化版)</title><script src="https://cdn.bootcdn.net/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script><script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.5/dist/JsBarcode.all.min.js"></script><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"><style>:root{--primary-gradient:linear-gradient(145deg,#2b6c9e,#5f2b8a);--border-color:#e9eef5;--focus-color:#6b46c1;--shadow-sm:0 8px 18px rgba(0,0,0,0.1);--radius-lg:40px;--radius-md:22px}*{margin:0;padding:0;box-sizing:border-box;font-family:'Inter',system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif}body{background:#ffffff;min-height:100vh;padding:20px;display:flex;align-items:flex-start;justify-content:center}.container{width:100%;max-width:1600px;background:#ffffff;border-radius:0;box-shadow:none;border:none;padding:32px 40px;position:relative}.watermark{position:absolute;bottom:18px;right:24px;color:rgba(0,0,0,0.04);font-size:0.9rem;font-weight:700;pointer-events:none}.header{text-align:center;margin-bottom:36px}.header h1{font-size:clamp(2rem,5vw,2.8rem);font-weight:700;background:var(--primary-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:inline-flex;align-items:center;justify-content:center;gap:12px;margin-bottom:8px;width:100%}.header p{font-size:clamp(1rem,2.5vw,1.2rem);color:#4a5568;opacity:0.8}.mode-switch{display:flex;justify-content:center;margin-bottom:36px}.mode-btn{background:#f1f5f9;color:#2d3748;border:1px solid #dde7f0;border-radius:var(--radius-lg);font-size:1.2rem;font-weight:600;padding:14px 40px;cursor:pointer;transition:0.2s;display:inline-flex;align-items:center;gap:12px;box-shadow:0 4px 10px rgba(0,0,0,0.05)}.mode-btn i{background:var(--primary-gradient);-webkit-background-clip:text;-webkit-text-fill-color:transparent}.mode-btn:hover{transform:translateY(-2px);box-shadow:0 10px 20px rgba(0,0,0,0.1)}.panel{transition:opacity 0.2s ease}.hidden-panel{display:none}.input-group{margin-bottom:28px}.input-group label{display:block;margin-bottom:10px;font-weight:600;color:#2d3748;padding-left:8px;font-size:1.1rem}textarea,input{width:100%;padding:16px 22px;border:2px solid var(--border-color);border-radius:var(--radius-md);font-size:1.1rem;background:#ffffff;box-shadow:inset 0 3px 10px rgba(0,0,0,0.02);transition:0.2s;outline:none}textarea{height:180px;resize:vertical;line-height:1.5}textarea:focus,input:focus{border-color:var(--focus-color);box-shadow:0 0 0 4px rgba(107,70,193,0.15)}.controls{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap;justify-content:flex-start}button{border:none;border-radius:var(--radius-lg);font-size:1.1rem;font-weight:600;cursor:pointer;transition:0.2s;display:inline-flex;align-items:center;justify-content:center;gap:8px;box-shadow:var(--shadow-sm);padding:14px 28px;flex:0 1 auto}button:hover{transform:translateY(-3px);box-shadow:0 15px 25px rgba(0,0,0,0.15)}.generate-btn{background:var(--primary-gradient);color:white}.clear-btn{background:#f1f5f9;color:#2d3748;border:1px solid #dde7f0}.download-all-btn,.barcode-download-btn{background:linear-gradient(145deg,#b45309,#c2410c);color:white}.qr-grid{display:flex;flex-wrap:wrap;gap:28px;justify-content:flex-start;margin:30px 0 20px;max-height:700px;overflow-y:auto;padding:8px 4px}.qr-card{background:white;border-radius:28px;padding:22px 18px 18px;box-shadow:0 20px 35px -8px rgba(0,0,0,0.2);flex:1 1 260px;max-width:320px;display:flex;flex-direction:column;align-items:center;transition:0.2s}.qr-card:hover{transform:translateY(-5px)}.qr-card .qr-code{background:white;padding:12px;border-radius:24px;box-shadow:0 8px 22px rgba(0,0,0,0.08);margin-bottom:18px;width:100%;display:flex;justify-content:center}.qr-card .text-custom{width:100%;margin:8px 0 12px}.qr-card .text-input{width:100%;padding:10px 14px;border:2px solid var(--border-color);border-radius:var(--radius-lg);font-size:0.95rem;text-align:center;background:#f9fcff;transition:0.2s;color:#1a202c}.qr-card .download-single{background:linear-gradient(145deg,#0f766e,#0b5e5a);color:white;border:none;border-radius:30px;padding:8px 16px;font-size:0.95rem;font-weight:600;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;gap:6px;transition:0.2s;box-shadow:0 4px 10px rgba(0,0,0,0.1);width:auto;min-width:120px}.qr-card .download-single:hover{background:linear-gradient(145deg,#0b5e58,#094c47);transform:scale(1.02)}.empty-message{text-align:center;color:#94a3b8;padding:40px;width:100%}.barcode-card{background:white;border-radius:32px;padding:32px 20px;box-shadow:0 25px 40px -14px rgba(0,0,0,0.25);margin:20px 0 15px;display:flex;justify-content:center;align-items:center;flex-direction:column}.barcode-card canvas{max-width:100%;height:auto;border-radius:16px;background:#ffffff;max-height:300px;width:auto;margin:0 auto}.barcode-hint{font-size:0.95rem;color:#718096;margin-top:16px;text-align:center;background:#f7fafc;padding:12px 16px;border-radius:var(--radius-lg)}.footer{text-align:center;margin-top:40px;color:#6b7a8f;font-size:0.9rem;padding-top:24px;border-top:1px solid #e7edf4}@media (max-width:640px){.container{padding:20px 16px}.qr-card{width:100%;max-width:300px;flex:none;margin-left:auto;margin-right:auto}.controls{justify-content:center}button{width:100%}}</style></head><body><div class="container"><div class="watermark">✦ CODEL28 FIXED ✦</div><div class="header"><h1><i class="fa-solid fa-arrows-rotate"></i> 码工坊 · 双模式</h1><p>点击下方按钮切换 批量二维码 / 单一条码</p></div><div class="mode-switch"><button class="mode-btn" id="switchModeBtn"><i class="fa-solid fa-qrcode"></i><span id="modeBtnText">切换到条码模式</span><i class="fa-solid fa-barcode"></i></button></div><div id="qrPanel" class="panel"><div class="input-group"><label for="inputText"><i class="fa-regular fa-message"></i> 输入内容 (一行一个)</label> <textarea id="inputText" placeholder="https://baidu.com&#10;Hello World&#10;扫码有惊喜" spellcheck="false">https://baidu.com
Hello World
扫码有惊喜</textarea> </div><div class="controls"><button class="generate-btn" id="generateBtn"><i class="fa-solid fa-bolt"></i> 批量生成二维码</button><button class="clear-btn" id="clearBtn"><i class="fa-regular fa-trash-can"></i> 清空全部</button><button class="download-all-btn" id="downloadAllBtn"><i class="fa-regular fa-image"></i> 保存全部长图</button></div><div id="qrGrid" class="qr-grid"><div class="empty-message"><i class="fa-solid fa-qrcode fa-2xl" style="opacity:0.3;"></i><p>点击「批量生成」预览二维码卡片</p></div></div></div><div id="barcodePanel" class="panel hidden-panel"><div class="barcode-section"><div class="input-group"><label for="barcodeInput"><i class="fa-regular fa-keyboard"></i> 条码内容</label><input type="text" id="barcodeInput" placeholder="例如: 5901234123457 或 YT123456" value="5901234123457"></div><div class="controls"><button class="generate-btn" id="barcodeGenerateBtn"><i class="fa-solid fa-rotate"></i> 生成条码</button><button class="barcode-download-btn" id="barcodeDownloadBtn"><i class="fa-regular fa-circle-down"></i> 保存条码图片</button></div><div class="barcode-card"><canvas id="barcodeCanvas"></canvas></div><div class="barcode-hint" id="barcodeHint"><i class="fa-regular fa-lightbulb"></i> 当前格式: Code128 — 支持任意ASCII字符</div></div></div><div class="footer"><p>© 2026 · 二维码/条码自由切换 (桌面优化版)</p></div></div><script>(function() { const STORAGE_KEY = 'preferredMode'; const switchBtn = document.getElementById('switchModeBtn'); const btnText = document.getElementById('modeBtnText'); const qrPanel = document.getElementById('qrPanel'); const barcodePanel = document.getElementById('barcodePanel'); const barcodeCanvas = document.getElementById('barcodeCanvas'); let isQrMode = true; function switchToQr() { qrPanel.classList.remove('hidden-panel'); barcodePanel.classList.add('hidden-panel'); btnText.innerText = '切换到条码模式'; isQrMode = true; localStorage.setItem(STORAGE_KEY, 'qr'); } function switchToBarcode() { qrPanel.classList.add('hidden-panel'); barcodePanel.classList.remove('hidden-panel'); btnText.innerText = '切换到二维码模式'; isQrMode = false; localStorage.setItem(STORAGE_KEY, 'barcode'); if (barcodeCanvas && barcodeCanvas.width === 0) generateBarcode(); } function initMode() { const savedMode = localStorage.getItem(STORAGE_KEY); savedMode === 'barcode' ? switchToBarcode() : switchToQr(); } switchBtn.addEventListener('click', () => isQrMode ? switchToBarcode() : switchToQr()); (function() { const inputText = document.getElementById('inputText'); const grid = document.getElementById('qrGrid'); const generateBtn = document.getElementById('generateBtn'); const clearBtn = document.getElementById('clearBtn'); const downloadAllBtn = document.getElementById('downloadAllBtn'); function showEmptyMessage() { grid.innerHTML = `<div class="empty-message"><i class="fa-solid fa-qrcode fa-2xl" style="opacity:0.3;"></i><p>点击「批量生成」预览二维码卡片</p></div>`; } function clearGrid() { grid.innerHTML = ''; showEmptyMessage(); } function getQRImage(qrContainer) { return new Promise((resolve, reject) => { const canvas = qrContainer.querySelector('canvas'); if (canvas) { const img = new Image(); img.onload = () => resolve(img); img.onerror = reject; img.src = canvas.toDataURL('image/png'); } else { const imgElem = qrContainer.querySelector('img'); if (imgElem?.src) { const img = new Image(); img.onload = () => resolve(img); img.onerror = reject; img.src = imgElem.src; } else { reject('未找到二维码图像'); } } }); } async function drawQRWithText(qrContainer, bottomText) { const qrImage = await getQRImage(qrContainer); const qrWidth = qrImage.width; const qrHeight = qrImage.height; const padding = 20, fontSize = 24, textPadding = 16; let canvasHeight = qrHeight + padding * 2; if (bottomText) canvasHeight += fontSize + textPadding * 2; const canvas = document.createElement('canvas'); canvas.width = qrWidth + padding * 2; canvas.height = canvasHeight; const ctx = canvas.getContext('2d'); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, canvas.width, canvas.height); ctx.drawImage(qrImage, padding, padding, qrWidth, qrHeight); if (bottomText) { ctx.fillStyle = '#000000'; ctx.font = `bold ${fontSize}px 'Inter', system-ui, sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle'; const textY = padding + qrHeight + textPadding + fontSize / 2; const maxWidth = canvas.width - 2 * padding; if (ctx.measureText(bottomText).width> maxWidth) { let fontSizeAdjusted = fontSize * (maxWidth / ctx.measureText(bottomText).width); fontSizeAdjusted = Math.min(fontSize, fontSizeAdjusted); ctx.font = `bold ${fontSizeAdjusted}px 'Inter', system-ui, sans-serif`; } ctx.fillText(bottomText, canvas.width / 2, textY); } return canvas; } function generateAll() { const raw = inputText.value; const lines = raw.split(/\n/).map(l => l.trim()).filter(l => l); if (!lines.length) return alert('至少输入一行内容'); if (typeof QRCode === 'undefined') { grid.innerHTML = `<div class="empty-message" style="color:#b91c1c;">二维码库加载失败，请刷新</div>`; return; } grid.innerHTML = ''; lines.forEach((line, idx) => { const card = document.createElement('div'); card.className = 'qr-card'; card.dataset.index = idx; const qrDiv = document.createElement('div'); qrDiv.className = 'qr-code'; const customDiv = document.createElement('div'); customDiv.className = 'text-custom'; const textInput = document.createElement('input'); textInput.type = 'text'; textInput.className = 'text-input'; textInput.value = line; textInput.placeholder = '底部文字'; const downloadBtn = document.createElement('button'); downloadBtn.className = 'download-single'; downloadBtn.innerHTML = '<i class="fa-regular fa-circle-down"></i> 保存'; card.appendChild(qrDiv); customDiv.appendChild(textInput); card.appendChild(customDiv); card.appendChild(downloadBtn); grid.appendChild(card); try { new QRCode(qrDiv, { text: line, width: 160, height: 160, colorDark: "#1a202c", colorLight: "#ffffff", correctLevel: QRCode.CorrectLevel.H }); } catch { qrDiv.innerHTML = '<span style="color:red;">失败</span>'; } downloadBtn.addEventListener('click', async function() { const qrContainer = card.querySelector('.qr-code'); const text = card.querySelector('.text-input').value.trim(); try { const resultCanvas = await drawQRWithText(qrContainer, text); const link = document.createElement('a'); link.download = `qrcode_${idx + 1}.png`; link.href = resultCanvas.toDataURL('image/png'); link.click(); } catch (err) { console.error(err); alert('下载失败，请重试'); } }); }); } async function downloadAllAsLongImage() { const cards = document.querySelectorAll('.qr-card'); if (!cards.length) return alert('没有可下载的卡片，请先生成'); const canvasArray = []; for (let card of cards) { const qrContainer = card.querySelector('.qr-code'); const text = card.querySelector('.text-input').value.trim(); try { canvasArray.push(await drawQRWithText(qrContainer, text)); } catch (e) { console.warn('卡片处理失败', e); } } if (!canvasArray.length) return; const maxWidth = Math.max(...canvasArray.map(c => c.width)); const totalHeight = canvasArray.reduce((acc, c) => acc + c.height, 0); const combinedCanvas = document.createElement('canvas'); combinedCanvas.width = maxWidth; combinedCanvas.height = totalHeight; const ctx = combinedCanvas.getContext('2d'); ctx.fillStyle = '#ffffff'; ctx.fillRect(0, 0, combinedCanvas.width, combinedCanvas.height); let y = 0; for (let canv of canvasArray) { ctx.drawImage(canv, (maxWidth - canv.width) / 2, y); y += canv.height; } const link = document.createElement('a'); link.download = 'all_qrcodes_long.png'; link.href = combinedCanvas.toDataURL('image/png'); link.click(); } generateBtn.addEventListener('click', generateAll); clearBtn.addEventListener('click', () => { inputText.value = ''; clearGrid(); }); downloadAllBtn.addEventListener('click', downloadAllAsLongImage); inputText.addEventListener('keydown', e => { if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') { e.preventDefault(); generateAll(); } }); })(); function generateBarcode() { const inputEl = document.getElementById('barcodeInput'); const canvas = document.getElementById('barcodeCanvas'); const hintEl = document.getElementById('barcodeHint'); const text = inputEl.value.trim(); if (!text) return alert('请输入条码内容'); const format = 'code128'; hintEl.innerHTML = `<i class="fa-regular fa-lightbulb"></i> 当前格式: Code128 — 支持任意ASCII字符`; try { JsBarcode(canvas, text, { format: format, width: 2.0, height: 80, displayValue: true, font: 'Inter, monospace', fontSize: 18, fontOptions: 'bold', textAlign: 'center', textPosition: 'bottom', textMargin: 8, margin: 12, background: '#ffffff', lineColor: '#1a202c' }); } catch (e) { console.warn('条码生成错误:', e); alert(`生成失败：${e.message || '请检查输入内容'}`); const ctx = canvas.getContext('2d'); ctx.clearRect(0, 0, canvas.width, canvas.height); ctx.font = '14px Inter'; ctx.fillStyle = '#999'; ctx.textAlign = 'center'; ctx.fillText('无效的数据', canvas.width/2, canvas.height/2); } } const barcodeGenerateBtn = document.getElementById('barcodeGenerateBtn'); const barcodeDownloadBtn = document.getElementById('barcodeDownloadBtn'); const barcodeInput = document.getElementById('barcodeInput'); barcodeGenerateBtn.addEventListener('click', generateBarcode); barcodeDownloadBtn.addEventListener('click', () => { const canvas = document.getElementById('barcodeCanvas'); const inputEl = document.getElementById('barcodeInput'); if (canvas.width === 0 || canvas.height === 0) return alert('没有可下载的条码，请先生成'); try { const link = document.createElement('a'); link.download = `barcode_${(inputEl.value.trim().slice(0,10) || 'code')}.png`; link.href = canvas.toDataURL('image/png'); link.click(); } catch { alert('下载失败，请稍后重试'); } }); barcodeInput.addEventListener('keypress', e => { if (e.key === 'Enter') { e.preventDefault(); generateBarcode(); } }); window.generateBarcode = generateBarcode; initMode(); })();</script></body></html>
